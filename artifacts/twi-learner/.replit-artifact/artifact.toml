kind = "mobile"
previewPath = "/"
title = "Twi Alphabet & Numeral Reciter"
version = "1.0.0"
id = "artifacts/twi-learner"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20999

[services.development]
run = "pnpm --filter @workspace/twi-learner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/twi-learner", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/twi-learner", "run", "serve" ]

[services.env]
PORT = "20999"
BASE_PATH = "/"
